<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personal Profile</title>

<!-- Bootstrap 4 CDN -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

</head>
<body>

<div class="container mt-5">
    <div class="row align-items-center">
        
        <!-- Left Column (Image) -->
        <div class="col-md-4 text-center mb-3">
            <img src="profile.jpg"
                 class="img-fluid rounded-circle" 
                 alt="Profile Image">
        </div>

        <!-- Right Column (Name and Bio) -->
        <div class="col-md-8">
            <h2>John Doe</h2>
            <p>
                John is a passionate web developer who enjoys creating responsive
                and user-friendly websites. He specializes in HTML, CSS, Bootstrap,
                and JavaScript, and loves learning new technologies to improve his
                skills.
            </p>
        </div>

    </div>
</div>

</body>
</html>
